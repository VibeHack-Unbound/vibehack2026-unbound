packages:
  - api
  - web

allowBuilds:
  core-js: true
  esbuild: true
  protobufjs: true
  sharp: true
  workerd: true

catalog:
  wrangler: ^4.87.0

minimumReleaseAge: 1440

onlyBuiltDependencies:
  - core-js
  - esbuild
  - protobufjs
  - sharp
  - workerd

strictDepBuilds: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - semver@6.3.1
  - '@types/node@22.19.19'
  - undici-types@6.21.0
  - chokidar@4.0.3

verifyDepsBeforeRun: install
